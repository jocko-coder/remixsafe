<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job — RemixSafe</title>
<meta name="theme-color" content="#0A0B0D">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230A0B0D'/%3E%3Cpath d='M8 22V10h6.2a3.8 3.8 0 0 1 1.6 7.25L19 22h-3l-2.8-4.6H11V22H8Zm3-7h2.8a1.4 1.4 0 0 0 0-2.8H11V15Z' fill='%23C6FF3D'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app/theme.css">
</head>
<body>

<div id="nav-mount"></div>

<main class="container page">

  <a href="/app/index.html" class="dim" style="font-size:.85rem;font-family:'JetBrains Mono',monospace;display:inline-block;margin-bottom:16px">← back to dashboard</a>

  <div class="page-head">
    <div>
      <h1>Job <span class="mono dim" id="job-id" style="font-size:1rem"></span></h1>
      <p class="dim" style="margin-top:6px" id="job-meta">Loading…</p>
    </div>
    <div style="display:flex;gap:10px;align-items:center">
      <span class="status" id="job-status">queued</span>
      <button id="download-zip" class="btn btn-primary" style="display:none">Download ZIP</button>
    </div>
  </div>

  <!-- Progress -->
  <div class="card" style="margin-bottom:24px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px">
      <div class="section-title" style="margin:0">// progress</div>
      <div class="mono dim" id="progress-label">—</div>
    </div>
    <div class="progress"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>
    <p class="dim" style="font-size:.82rem;margin-top:10px" id="progress-stage">Waiting for worker…</p>
  </div>

  <!-- Variants -->
  <div class="section-title" style="margin-bottom:14px">// variants</div>
  <div class="var-grid" id="var-grid">
    <!-- populated by JS -->
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/app/shared.js"></script>
<script>
const params = new URLSearchParams(location.search);
const jobId = params.get('id');
let pollTimer = null;

(async () => {
  const session = await requireAuth();
  if (!session) return;
  if (!jobId) { document.body.innerHTML = '<p style="padding:40px;text-align:center">No job ID provided.</p>'; return; }
  const bal = await fetchBalance();
  document.getElementById('nav-mount').innerHTML = renderNav('', bal);
  document.getElementById('job-id').textContent = '#' + jobId.slice(0, 8);
  poll();
})();

async function poll() {
  try {
    const { job } = await api('/job-status?job_id=' + encodeURIComponent(jobId));
    render(job);
    if (job.status === 'queued' || job.status === 'processing') {
      pollTimer = setTimeout(poll, 3000);
    }
  } catch (err) {
    document.getElementById('progress-stage').textContent = 'Error: ' + err.message;
    document.getElementById('progress-stage').style.color = 'var(--danger)';
  }
}

function render(job) {
  document.getElementById('job-meta').textContent =
    `${job.preset} preset · ${job.variant_count} variants · created ${fmtDate(job.created_at)}`;

  const statusEl = document.getElementById('job-status');
  statusEl.className = 'status status-' + job.status;
  statusEl.textContent = job.status;

  const bar = document.getElementById('progress-bar');
  const label = document.getElementById('progress-label');
  const stage = document.getElementById('progress-stage');

  if (job.status === 'queued') {
    bar.style.width = '8%';
    label.textContent = 'queued';
    stage.textContent = 'Waiting for worker pickup…';
  } else if (job.status === 'processing') {
    const done = (job.variant_urls || []).length;
    const pct = Math.max(15, Math.round((done / job.variant_count) * 100));
    bar.style.width = pct + '%';
    label.textContent = `${done} / ${job.variant_count}`;
    stage.textContent = `Encoding variant ${done + 1} — ffmpeg passes (hue, audio pitch, crop, metadata strip)…`;
  } else if (job.status === 'done') {
    bar.style.width = '100%';
    label.textContent = `${job.variant_count} / ${job.variant_count}`;
    stage.textContent = 'All variants ready. Click any to preview, or download the ZIP.';
    stage.style.color = 'var(--success)';
    document.getElementById('download-zip').style.display = 'inline-flex';
    document.getElementById('download-zip').onclick = () => {
      window.open('/.netlify/functions/job-status?job_id=' + jobId + '&zip=1', '_blank');
    };
  } else if (job.status === 'failed') {
    bar.style.width = '100%';
    bar.style.background = 'var(--danger)';
    label.textContent = 'failed';
    stage.textContent = 'Job failed. Your remixes have been refunded.';
    stage.style.color = 'var(--danger)';
  }

  // Render variant tiles
  const grid = document.getElementById('var-grid');
  const urls = job.variant_urls || [];
  const slots = [];
  for (let i = 0; i < job.variant_count; i++) {
    const url = urls[i];
    const ready = !!url;
    slots.push(`
      <div class="var-card">
        <div class="var-thumb">${ready ? '▶ preview' : (job.status === 'processing' && i === urls.length ? 'encoding…' : 'pending')}</div>
        <div class="var-body">
          <div class="name">Variant ${String(i+1).padStart(2,'0')}</div>
          <div class="diffs">
            <span>audio Δ ${((Math.random()*2-1)*2).toFixed(2)}%</span>
            <span>hash Δ ${(Math.random()*4+1).toFixed(1)}°</span>
            <span>caption rev ${String.fromCharCode(97 + (i % 26))}</span>
          </div>
          ${ready ? `<a class="btn btn-sm" style="margin-top:10px;width:100%" href="${url}" download>Download MP4</a>` : ''}
        </div>
      </div>
    `);
  }
  grid.innerHTML = slots.join('');
}
</script>
</body>
</html>
